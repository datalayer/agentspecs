id: schedule
version: 0.0.1
name: Schedule
description: >-
  Run on a recurring schedule using a cron expression
  (e.g. daily at 9 AM, every Monday, monthly on the 1st).
type: schedule
fields:
  - name: cron
    label: Cron Expression
    type: string
    required: true
    placeholder: "0 9 * * * (every day at 9 AM)"
    font: mono
  - name: description
    label: Description
    type: string
    required: false
    placeholder: "Description (e.g. 'Monthly sales report')"
  - name: prompt
    label: Trigger Prompt
    type: string
    required: false
    placeholder: "Run the scheduled workflow and produce the configured deliverable."
