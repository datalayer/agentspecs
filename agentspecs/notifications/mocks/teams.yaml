id: teams
name: Teams
description: >-
  Post notifications to a Microsoft Teams channel via incoming
  webhook connector when agent events occur.
icon: bell
available: false
coming_soon: true
fields:
  - name: webhook_url
    label: Webhook URL
    type: string
    required: true
    placeholder: "https://outlook.office.com/webhook/..."
  - name: include_output
    label: Include Output
    type: boolean
    required: false
    default: false
