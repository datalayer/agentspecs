id: email
name: Email
description: >-
  Send notifications via email when agent events occur.
  Supports completion alerts, failure reports, and summary digests.
icon: mail
available: true
fields:
  - name: recipients
    label: Recipients
    type: string
    required: true
    placeholder: "ops@company.com, team-lead@company.com"
  - name: subject_template
    label: Subject Template
    type: string
    required: false
    placeholder: "[Agent] {{agent_name}} — {{event_type}}"
  - name: include_output
    label: Include Output
    type: boolean
    required: false
    default: true
