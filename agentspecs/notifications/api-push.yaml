id: api-push
version: 0.0.1
name: API Push
description: >-
  Push results to an external API endpoint via HTTP POST.
  Useful for integrating with downstream services, data warehouses,
  or event-driven architectures.
icon: upload
available: false
coming_soon: true
fields:
  - name: url
    label: Endpoint URL
    type: string
    required: true
    placeholder: "https://api.example.com/agent-results"
  - name: secret
    label: Signing Secret
    type: string
    required: false
    placeholder: "Optional HMAC secret for payload signing"
  - name: include_output
    label: Include Output
    type: boolean
    required: false
    default: true
