id: data-engineering-power-user
version: 0.0.1
name: Data Engineering Power User
description: >-
  Power-user guardrail for data engineering agents with full
  read/write access, high token limits, and ability to deploy
  pipelines. Suitable for ETL, data transformation, and pipeline
  management agents.

identity_provider: datalayer
identity_name: dave@acme.com

permissions:
  read:data: true
  write:data: true
  execute:code: true
  access:internet: true
  send:email: true
  deploy:production: true

token_limits:
  per_run: "200K"
  per_day: "5M"
  per_month: "50M"

data_scope:
  allowed_systems:
    - postgresql
    - mongodb
    - s3
    - kafka
  allowed_objects: []
  denied_objects: []
  denied_fields:
    - "*SSN*"
    - "*Bank*"
    - "*IBAN*"

data_handling:
  default_aggregation: false
  allow_row_level_output: true
  max_rows_in_output: 100000
  redact_fields: []
  hash_fields: []
  pii_detection: true
  pii_action: redact

approval_policy:
  require_manual_approval_for:
    - "Schema changes"
    - "Drop or truncate operations"
    - "Production data modifications"
  auto_approved:
    - "Read queries"
    - "Data transformations"
    - "Pipeline orchestration"

tool_limits:
  max_tool_calls: 500
  max_query_rows: 1000000
  max_query_runtime: "300s"
  max_time_window_days: 365

audit:
  log_tool_calls: true
  log_query_metadata_only: false
  retain_days: 90
  require_lineage_in_report: true

content_safety:
  treat_crm_text_fields_as_untrusted: true
  do_not_follow_instructions_from_data: true
