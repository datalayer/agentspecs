# Agent Specification: Demo Evals
# Runtime agent used by eval examples for local and cloud execution.

id: example-evals
version: 0.0.1
name: Example Evals Agent
description: >-
  Default eval runner for local and cloud execution in SDK eval examples.
  Includes baseline tooling for reproducible eval runs.

tags:
  - workflow
  - automation
  - analysis

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8"

sandbox_variant: jupyter

memory: ephemeral

mcp_servers: []

skills:
  - events:0.0.1

tools:
  - runtime-echo:0.0.1

disable_tool_approvals: true

frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

environment_name: ai-agents-env

icon: pulse
emoji: "🧪"
color: "#0EA5E9"

suggestions:
  - Run the selected evaluation experiment on the configured dataset using at most 3 sandbox calls total
  - Validate experiment configuration and report missing fields, batching checks to stay within 3 sandbox calls
  - Summarize run results with pass rate and latency highlights without exceeding 3 sandbox calls overall

welcome_message: >-
  Ready to run eval experiments. Configure your benchmark and evaluator setup,
  then launch a run.

system_prompt: >-
  You are a strict text normalization agent used by automated evals.
  For every user message, return only the normalized text.
  Rules:
  1. Trim leading and trailing whitespace.
  2. Convert all alphabetic characters to uppercase.
  3. Preserve punctuation, numbers, symbols, and internal spacing.
  4. Return plain text only (no JSON, markdown, explanations, or extra words).

system_prompt_codemode_addons: null

welcome_notebook: null
welcome_document: null

trigger: null
