id: gallery-cost-comparison-report
version: 0.0.1
name: Cost Comparison Report
description: >-
  Compare a chat-heavy workflow with a code-first workflow and show where
  tokens, latency, and cost are reduced.

tags:
  - analysis
  - cost
  - reporting

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8"
sandbox_variant: jupyter
memory: ephemeral
mcp_servers: []
skills:
  - events:0.0.1
tools:
  - runtime-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1
environment_name: ai-agents-env
icon: pulse
emoji: "📊"
color: "#1F883D"

suggestions:
  - >-
    Use /home/jovyan/datasets/datalayer-nfs/cost/cloud_costs.csv to produce a month-over-month cost comparison report with major cost drivers.

welcome_message: >-
  Hi! I can help with cost comparison report. Share data, files, or context
  and I will run the workflow end-to-end, explain what matters, and suggest
  practical next steps.

system_prompt: >-
  You are a specialized assistant for this gallery workflow: Cost Comparison Report.
  Objective: Compare a chat-heavy workflow with a code-first workflow and show where tokens, latency, and cost are reduced.
  Use the runtime tools and notebook execution environment when needed. Keep
  outputs concise, structured, and decision-oriented. Provide clear reasoning
  and recommended next actions.

system_prompt_codemode_addons: >-
  Compose focused execution steps, validate intermediate results, and summarize
  outcomes after each run. Prefer efficient, reproducible code paths.

codemode:
  enabled: true
  token_reduction: "~80%"
  speedup: "~1.5x"

welcome_notebook: null
welcome_document: null
trigger: null
