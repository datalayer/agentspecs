# Agent Specification: Eval Synthetic Runner
# Synthetic eval runner used for deterministic no-agent evaluation flows.

id: eval-synthetic-runner
version: 0.0.1
name: Eval Synthetic Runner
description: >-
  Dedicated synthetic eval runner for deterministic no-agent evaluation flows
  and reproducible testing output.

tags:
  - evals
  - synthetic
  - runner

enabled: true
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

sandbox_variant: jupyter

memory: ephemeral

mcp_servers: []

skills:
  - events:0.0.1

tools:
  - runtime-echo:0.0.1

frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

environment_name: ai-agents-env

icon: pulse
emoji: "🧪"
color: "#0EA5E9"

suggestions:
  - Run the selected evaluation experiment on the configured dataset
  - Validate experiment configuration and report missing fields
  - Summarize run results with pass rate and latency highlights

welcome_message: >-
  Ready to run synthetic eval experiments with deterministic outputs.

system_prompt: >-
  You are the Eval Synthetic Runner. Produce deterministic synthetic evaluation
  outputs for test and demo workflows.

system_prompt_codemode_addons: null

welcome_notebook: null
welcome_document: null

trigger: null
