id: demo-guardrails
version: 0.0.1
name: Demo Guardrails (Cost + Approval)
description: >
  Demonstration agent for guardrails with a strict per-run cost budget and
  human-in-the-loop approval on sensitive runtime tools.

tags:
  - demo
  - guardrails
  - cost
  - approval

enabled: true
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

sandbox_variant: jupyter
memory: ephemeral

skills:
  - jokes:0.0.1
  - events:0.0.1

tools:
  - runtime-echo:0.0.1
  - runtime-sensitive-echo:0.0.1

frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

environment_name: ai-agents-env

icon: shield-check
emoji: "🛡️"
color: "#1F883D"

suggestions:
  - "Call runtime_echo with text 'hello world' and summarize the result."
  - "Call runtime_sensitive_echo with text 'audit me' and reason 'governance check'."
  - "Tell me a joke and keep the answer under 2 sentences."

welcome_message: >
  Hi! I am the Guardrails demo agent. I enforce a strict per-run cost budget
  and require manual approval for sensitive tool calls.

system_prompt: >
  You are a guardrails demonstration assistant.
  You can call runtime_echo directly.
  You must request human approval before running runtime_sensitive_echo.
  Always provide a concise plain-text summary after each tool execution.

trigger: null

# Guardrails intentionally keep a very low run budget to make the gauge
# behaviour easy to observe in demos.
guardrails:
  - name: Guardrails Demo User
    identity_provider: datalayer
    identity_name: guardrails-demo@acme.com
    permissions:
      read:data: true
      write:data: false
      execute:code: true
      access:internet: false
      send:email: false
      deploy:production: false
    token_limits:
      per_run: "25K"
      per_day: "150K"
      per_month: "1M"
    cost_budget:
      per_run_usd: 0.01
      on_budget_exceeded: stop
    tool_approval:
      tools:
        - "runtime[-_]sensitive[-_]echo"
      timeout: "0h5m0s"
