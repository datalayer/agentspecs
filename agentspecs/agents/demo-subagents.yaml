# Agent Specification: Subagents Demo
# Demonstrates multi-agent delegation via subagents-pydantic-ai.
# The parent agent orchestrates a researcher and a writer subagent.

id: demo-subagents
version: 0.0.1
name: Subagents Demo
description: >
  A demonstration agent that delegates tasks to specialised subagents.
  It has a researcher subagent for gathering information and a writer
  subagent for composing clear, structured responses.

tags:
  - demo
  - subagents
  - multi-agent
  - delegation

enabled: true
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

sandbox_variant: jupyter

# Memory backend
memory: ephemeral

# No MCP servers — subagents handle their own tools
mcp_servers: []

# Skills
skills:
  - events:0.0.1

# No extra runtime tools
tools: []
frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

# Runtime environment
environment_name: ai-agents-env

# UI customization
icon: people
emoji: 👥
color: "#8B5CF6"  # Purple

# Chat suggestions
suggestions:
  - "Research the pros and cons of Python async patterns and write a summary."
  - "Find recent advances in LLM fine-tuning and create a brief report."
  - "Investigate best practices for REST API design and draft a style guide."
  - "Analyze the current state of WebAssembly and produce an executive summary."

# Welcome message
welcome_message: >
  Hi! I'm the Subagents Demo agent. I coordinate a team of specialised helpers:
  a **Researcher** who gathers information and a **Writer** who turns findings
  into polished prose. Ask me anything and I'll delegate to the right expert!

# System prompt
system_prompt: >
  You are a helpful orchestrator agent. You have access to specialised subagents
  that you can delegate tasks to. Use the 'task' tool to assign work:
  - Use the 'researcher' subagent for gathering facts, searching for information, and analysis.
  - Use the 'writer' subagent for composing text, formatting documents, and editing prose.
  You can run tasks synchronously (wait for result) or asynchronously (fire and forget, check later).
  Always summarise the delegated results for the user in a clear, helpful way.

# Subagents configuration — maps to SubAgentCapability at runtime
subagents:
  default_model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"
  include_general_purpose: true
  max_nesting_depth: 0
  subagents:
    - name: researcher
      description: "Researches topics, gathers facts, and provides detailed analysis"
      instructions: >
        You are a thorough research assistant. When given a topic:
        1. Break it down into key questions
        2. Provide well-structured findings with evidence
        3. Cite sources or reasoning for each claim
        4. Highlight areas of uncertainty or debate
        Format your response with clear sections and bullet points.
      preferred_mode: sync
      typical_complexity: moderate
      can_ask_questions: true
      max_questions: 3

    - name: writer
      description: "Writes clear, structured content based on research or instructions"
      instructions: >
        You are a skilled technical writer. When given content to write:
        1. Organise information into a logical structure
        2. Use clear, concise language appropriate for the audience
        3. Include headings, bullet points, and formatting for readability
        4. Maintain a professional yet approachable tone
        Always produce complete, publication-ready text.
      preferred_mode: sync
      typical_complexity: moderate
      can_ask_questions: false
