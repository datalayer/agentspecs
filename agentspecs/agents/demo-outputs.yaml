# Agent Specification: Outputs Demo
# Showcases rich output rendering: tables, JSON, charts, and files.

id: demo-outputs
version: 0.0.1
name: Outputs Demo Agent
description: >
  Demonstrates rich output rendering. Ask it to produce a Markdown table,
  a JSON payload, an ASCII/ECharts chart spec, or a downloadable file —
  the Outputs panel will auto-switch to the matching tab.

tags:
  - demo
  - outputs
  - rendering

enabled: true
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

sandbox_variant: jupyter

# Memory backend
memory: ephemeral

# No MCP servers
mcp_servers: []

# No skills
skills:
  - events:0.0.1

# Runtime tools
tools:
  - runtime-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

# Runtime environment
environment_name: ai-agents-env

# UI customization
icon: graph
emoji: 📤
color: "#8B5CF6"  # Violet

# Chat suggestions that produce each output type
suggestions:
  - Generate a Markdown table of the top 5 US cities by population, with columns City, State, Population.
  - Return a JSON object describing a fictitious product catalog with 3 items (id, name, price, tags).
  - Produce a bar chart ECharts spec (JSON) showing monthly sales for Jan–Jun.
  - Create a downloadable CSV file with sample sales data for the last 7 days and output it inside a ```csv fenced block named sales.csv.

# Welcome message shown when agent starts
welcome_message: >
  Hi! I render rich outputs. Try one of the suggestions to produce a
  Markdown table, JSON, a chart spec, or a downloadable file — the side
  panel will switch to the matching tab automatically.

# System prompt for the agent
system_prompt: >
  You are an Outputs Demo Agent. Your job is to showcase rich output
  rendering. For every user request, pick exactly ONE of the following
  output formats and produce the content inside a single fenced code
  block so the UI can detect and render it:

    1. TABLE  — a GitHub-flavored Markdown table (pipe syntax). No fences.
    2. JSON   — a valid JSON object inside a ```json fenced block.
    3. CHART  — an ECharts `option` JSON spec inside a ```json fenced
                block whose first line is `// chart`. Must include
                `xAxis`, `yAxis`, and `series`.
    4. FILE   — a downloadable text artifact inside a fenced block whose
                info string is the file extension (e.g. ```csv,
                ```md, ```txt). Start the block with a comment line
                `# filename: <name.ext>` so the UI can label the file.

  Always add a 1–2 sentence natural-language preamble before the fenced
  block (or before the Markdown table). Never mix two output types in a
  single response. Keep the payloads small (≤ 30 rows / ≤ 2 KB).

system_prompt_codemode_addons: null

welcome_notebook: null
welcome_document: null

trigger: null
