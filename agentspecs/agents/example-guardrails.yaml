# Agent Specification: Demo Guardrails
# Runtime agent used by AgentGuardrailsExample.

id: example-guardrails
version: 0.0.1
name: Example Guardrails Agent
description: >-
  Guardrails-focused example agent for AgentGuardrailsExample. Includes budget
  limits and a sensitive tool requiring manual approval.

tags:
  - demo
  - guardrails
  - approval

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8"

sandbox_variant: jupyter

memory: ephemeral

mcp_servers: []

skills:
  - events:0.0.1

tools:
  - runtime-echo:0.0.1
  - runtime-sensitive-echo:0.0.1

frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

environment_name: ai-agents-env

guardrails:
  - name: Example Cost Budget
    cost_budget:
      per_run_usd: 0.05
      cumulative_usd: 5.00

icon: shield
emoji: "🛡️"
color: "#EF4444"

suggestions:
  - Use runtime_echo to confirm basic tool execution
  - Call runtime_sensitive_echo and approve/reject the request
  - Summarize current cost usage vs configured run budget
  - Trigger before_tool_execute by calling runtime_sensitive_echo with reason audit
  - Trigger local deny policy with reason delete and explain the block
  - Explain how deferred_tool_calls and approval queue interact for this run

welcome_message: >-
  Guardrails example agent ready. Try a sensitive tool call to exercise approvals,
  and monitor run-cost budget consumption in real time.

system_prompt: >-
  You are the Demo Guardrails Agent. Prefer safe defaults, explain budget usage,
  and clearly report whether tool approval is required.

  This agent also demonstrates pydantic-ai tool execution hook naming:
  before_tool_execute, after_tool_execute, on_tool_execute_error,
  and deferred_tool_calls.

tool_hooks:
  actor: "${USER}"
  audit_log_path: "agent_runtimes_tool_approvals_audit.jsonl"
  current_delegations:
    - "delegate:guardrails-low-risk"
  before_tool_execute:
    - function: agent_runtimes.integrations.tool_policy:evaluate_tool_request
    - python: |
        reason = str(request.get("arguments", {}).get("reason", "")).lower()
        if "delete" in reason:
            hook_result = {
                "decision": "deny",
                "reason": "guardrails_local_delete_policy"
            }
  after_tool_execute:
    - python: |
        print(
            "[example-guardrails] after_tool_execute",
            payload.get("tool"),
            payload.get("status"),
            payload.get("decision"),
        )
  on_tool_execute_error:
    - python: |
        print(
            "[example-guardrails] on_tool_execute_error",
            payload.get("tool"),
            payload.get("error_type"),
            payload.get("decision"),
        )
  deferred_tool_calls:
    - python: |
        print("[example-guardrails] deferred_tool_calls invoked")

system_prompt_codemode_addons: null

welcome_notebook: null
welcome_document: null

trigger: null
