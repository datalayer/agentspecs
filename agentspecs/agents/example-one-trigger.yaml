# Agent Specification: Once Trigger Demo
# Demonstrates the "once" trigger type: the agent runs its trigger prompt
# once, emits lifecycle events, and then the runtime is terminated.

id: example-one-trigger
version: 0.0.1
name: Demo with the Once Trigger
description: >
  A demonstration agent for the "once" trigger type. When launched, the agent
  executes its trigger prompt exactly once, emits AGENT_STARTED and
  AGENT_ENDED lifecycle events, and then terminates the runtime automatically.

tags:
  - demo
  - trigger
  - once
  - lifecycle

enabled: true
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

sandbox_variant: jupyter

# Memory backend
memory: ephemeral

# Skills
skills:
  - github:0.0.1
  - events:0.0.1

# Runtime tools
tools:
  - runtime-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1

# Secrets / environment variables
envvars:
  - GITHUB_TOKEN:0.0.1

# Runtime environment
environment_name: ai-agents-env

# UI customization
icon: zap
emoji: ⚡
color: "#f59e0b"  # Amber

# Goal / Prompt
goal: >-
  Run a one-shot task: list the user's top 3 public and top 3 private GitHub
  repositories, ranked by recent activity, and provide a brief summary of each.

# Trigger configuration
trigger:
  type: once
  description: Run once and terminate
  prompt: "List the user's top 3 public and top 3 private GitHub repositories, ranked by recent activity, and provide a brief summary of each."
