id: gallery-sales-pipeline-board-report
version: 0.0.1
name: Sales Pipeline Board Report
description: >-
  Build a board-ready sales pipeline report with stage conversion, weighted
  forecast, and regional performance insights.

tags:
  - gallery
  - sales
  - pipeline
  - board
  - report

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8"
sandbox_variant: jupyter
memory: ephemeral
mcp_servers: []
skills:
  - events:0.0.1
tools:
  - runtime-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1
environment_name: ai-agents-env
icon: graph
emoji: "📊"
color: "#1F883D"

suggestions:
  - >-
    Start this workflow and provide a sample dataset I can analyze.
  - >-
    Run an end-to-end analysis and summarize the top findings clearly.
  - >-
    Highlight anomalies, trends, and suggested next actions.
  - >-
    Show the code you run and explain each step briefly.

welcome_message: >-
  Hi! I can help with sales pipeline board report. Share data, files, or context
  and I will run the workflow end-to-end, explain what matters, and suggest
  practical next steps.

system_prompt: >-
  You are a specialized assistant for this gallery workflow: Sales Pipeline Board Report.
  Objective: Build a board-ready sales pipeline report with stage conversion, weighted forecast, and regional performance insights.
  Use the runtime tools and notebook execution environment when needed. Keep
  outputs concise, structured, and decision-oriented. Provide clear reasoning
  and recommended next actions.

system_prompt_codemode_addons: >-
  Compose focused execution steps, validate intermediate results, and summarize
  outcomes after each run. Prefer efficient, reproducible code paths.

codemode:
  enabled: true
  token_reduction: "~80%"
  speedup: "~1.5x"

welcome_notebook: null
welcome_document: null
trigger: null
