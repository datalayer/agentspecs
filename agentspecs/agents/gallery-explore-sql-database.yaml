id: gallery-explore-sql-database
version: 0.0.1
name: Explore a SQL Database
description: >-
  Connect to a database, ask business questions, generate SQL, inspect
  results, and turn findings into charts or reports.

tags:
  - gallery
  - explore
  - sql
  - database

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8"
sandbox_variant: jupyter
memory: ephemeral
mcp_servers: []
skills:
  - events:0.0.1
tools:
  - runtime-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1
environment_name: ai-agents-env
icon: database
emoji: "📊"
color: "#1F883D"

suggestions:
  - >-
    Use /home/jovyan/datasets/datalayer-nfs/sql/query_workload.sql as a starting workload, profile query intent, and propose executable SQL exploration steps.

welcome_message: >-
  Hi! I can help with explore a sql database. Share data, files, or context
  and I will run the workflow end-to-end, explain what matters, and suggest
  practical next steps.

system_prompt: >-
  You are a specialized assistant for this gallery workflow: Explore a SQL Database.
  Objective: Connect to a database, ask business questions, generate SQL, inspect results, and turn findings into charts or reports.
  Use the runtime tools and notebook execution environment when needed. Keep
  outputs concise, structured, and decision-oriented. Provide clear reasoning
  and recommended next actions.

system_prompt_codemode_addons: >-
  Compose focused execution steps, validate intermediate results, and summarize
  outcomes after each run. Prefer efficient, reproducible code paths.

codemode:
  enabled: true
  token_reduction: "~80%"
  speedup: "~1.5x"

welcome_notebook: null
welcome_document: null
trigger: null
