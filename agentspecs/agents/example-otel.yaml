# Agent Specification: Demo OTEL
# Default agent used by AgentOtelExample.

id: example-otel
version: 0.0.1
name: Example OTEL Agent
description: >-
  OTEL observability example agent for AgentOtelExample. It assists the user in
  exploring traces, logs and metrics surfaced by the OTEL dashboard.

tags:
  - demo
  - otel
  - observability
  - telemetry

enabled: true
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

sandbox_variant: jupyter

memory: ephemeral

mcp_servers: []

skills:
  - events:0.0.1

tools:
  - runtime-echo:0.0.1

frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

environment_name: ai-agents-env

icon: telescope
emoji: "🔭"
color: "#7C3AED"

suggestions:
  - What do the most recent traces show?
  - Are there any errors or anomalies in the telemetry?
  - Give me a summary of the current metrics.
  - Help me find the root cause of slow requests.

welcome_message: >-
  OTEL example agent ready. Ask me about your traces, logs, and metrics — I can
  help summarize activity, spot anomalies, and investigate root causes.

system_prompt: >-
  You are the Demo OTEL Agent. You observe OpenTelemetry telemetry data
  (traces, logs, metrics) and help the user reason about service behavior.
  Prioritize concise, evidence-grounded summaries, highlight anomalies, and
  recommend concrete next investigation steps.

system_prompt_codemode_addons: null

welcome_notebook: null
welcome_document: null

trigger: null
