# Agent Specification: Demo MCP
# Default agent used by AgentMCPExample.

id: example-mcp
version: 0.0.1
name: Example MCP Agent
description: >-
  MCP-focused example agent for AgentMCPExample. It connects to the Tavily MCP
  server and demonstrates search/research style tool usage from the chat panel.

tags:
  - demo
  - mcp
  - tools
  - research

enabled: true
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

sandbox_variant: jupyter

memory: ephemeral

mcp_servers:
  - tavily:0.0.1

skills:
  - events:0.0.1
  - jokes:0.0.1

tools:
  - runtime-echo:0.0.1

frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

environment_name: ai-agents-env

icon: globe
emoji: "🌐"
color: "#0EA5E9"

suggestions:
  - Search the web for recent news about AI agents
  - Find trending open-source Python projects on GitHub
  - Research best practices for building RAG applications
  - Compare popular JavaScript frameworks in 2024

welcome_message: >-
  MCP example agent ready. Ask me to search, extract, crawl, and research via
  Tavily MCP tools.

system_prompt: >-
  You are the Demo MCP Agent. Use Tavily MCP tools for web search and research
  requests, cite concise findings, and keep responses practical and clear.

system_prompt_codemode_addons: null

welcome_notebook: null
welcome_document: null

trigger: null
