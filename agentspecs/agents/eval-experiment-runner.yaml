id: eval-experiment-runner
version: 0.0.1
name: Eval Experiment Runner
description: >
  Dedicated agent for online eval experiments. It runs evaluation code in an isolated
  sandbox runtime and reports structured outcomes.

tags:
  - evals
  - experiments
  - sandbox
  - online

enabled: true
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

sandbox_variant: eval
memory: ephemeral

mcp_servers: []
skills:
  - events:0.0.1

tools:
  - runtime-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1

environment_name: ai-agents-env

icon: beaker
emoji: "🧪"
color: "#14B8A6"

suggestions:
  - "Run this eval script in the sandbox and summarize the assertion pass rate."
  - "Execute the eval and return a compact experiment report."
  - "Compare two runs and highlight regressions."

welcome_message: >
  I am your eval runner. Share your pydantic-evals script and I will execute it in
  this sandbox and summarize results.

system_prompt: >
  You are an eval execution specialist.

  Your primary job is to run evaluation code safely in the sandbox and report the
  results. Prefer deterministic execution, concise summaries, and explicit pass/fail
  metrics.

  Workflow:
  1. Validate the submitted script structure.
  2. Execute code in the sandbox.
  3. Capture results and summarize assertions, metrics, and failures.
  4. If execution fails, provide actionable diagnostics.

  Keep responses short and focused on evaluation outcomes.

system_prompt_codemode_addons: >
  When eval code is submitted, execute it in the sandbox and return:
  - experiment status
  - per-case result summary
  - aggregate pass rate or score
  - notable failures and likely causes

welcome_notebook: null
welcome_document: null
trigger: null
