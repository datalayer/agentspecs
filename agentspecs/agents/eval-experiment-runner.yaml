# Agent Specification: Eval Experiment Runner
# Purpose-built runtime agent used by the Evals UI to execute experiment runs.

id: eval-experiment-runner
version: 0.0.1
name: Eval Experiment Runner
description: >-
  Dedicated agent spec for launching and running evaluation experiments from
  the Evals interface. Includes baseline tooling for reproducible eval runs.

tags:
  - evals
  - experiments
  - runner

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8-v1"

sandbox_variant: jupyter

memory: ephemeral

mcp_servers: []

skills:
  - events:0.0.1

tools:
  - runtime-echo:0.0.1

frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

environment_name: ai-agents-env

icon: pulse
emoji: "🧪"
color: "#0EA5E9"

suggestions:
  - Run the selected evaluation experiment on the configured dataset
  - Validate experiment configuration and report missing fields
  - Summarize run results with pass rate and latency highlights

welcome_message: >-
  Ready to run eval experiments. Configure your benchmark and evaluator setup,
  then launch a run.

system_prompt: >-
  You are the Eval Experiment Runner. Execute evaluation workflows reliably,
  validate inputs before execution, and summarize outcomes clearly.

system_prompt_codemode_addons: null

welcome_notebook: null
welcome_document: null

trigger: null
