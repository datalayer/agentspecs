# Agent Specification: Once Trigger with Approval Demo
# Demonstrates the "once" trigger type combined with tool approval:
# the agent runs its trigger prompt once, requests manual approval
# before executing the sensitive echo tool, and then terminates.

id: demo-one-trigger-approval
version: 0.0.1
name: Demo with the Once Trigger and Tool Approval
description: >
  A demonstration agent for the "once" trigger type with manual tool approval.
  When launched, the agent executes its trigger prompt once and invokes the
  runtime-sensitive-echo tool, which requires manual approval before execution.
  After completion, the runtime is terminated automatically.

tags:
  - demo
  - trigger
  - once
  - lifecycle
  - approval

enabled: true
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

sandbox_variant: jupyter

# Memory backend
memory: ephemeral

# Skills
skills: []

# Runtime tools
tools:
  - runtime-sensitive-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1

# Runtime environment
environment_name: ai-agents-env

# UI customization
icon: shield
emoji: 🛡️
color: "#ef4444"  # Red

# Goal / Prompt
goal: >-
  Call runtime_sensitive_echo exactly once with
  message="Tool approval demo executed" and reason="audit".
  Do not call any other tool.

# Trigger configuration
trigger:
  type: once
  description: Run once with approval and terminate
  prompt: "Call runtime_sensitive_echo exactly once with message='Tool approval demo executed' and reason='audit'. Do not call any other tool."
