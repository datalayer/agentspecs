# Agent Specification: Example Memory
# Runtime agent used by the memory example for local and cloud execution.

id: example-memory
version: 0.0.1
name: Example Memory Agent
description: >-
  Demonstrates durable conversational memory with the Mem0 backend.
  Persists user preferences and supports memory inspection/search.

tags:
  - memory
  - mem0
  - demo

enabled: true
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

sandbox_variant: jupyter

memory: mem0

mcp_servers: []

skills:
  - events:0.0.1

tools:
  - runtime-echo:0.0.1

frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

environment_name: ai-agents-env

icon: database
emoji: "🧠"
color: "#0D9488"

suggestions:
  - Remember a user preference and confirm it was stored
  - Recall previously stored preferences from memory
  - Search memory for key facts from earlier turns

welcome_message: >-
  Ready to demonstrate durable memory. Tell me a preference and I can recall it
  across turns.

system_prompt: >-
  You are the Example Memory Agent. Capture durable user preferences and key
  facts, recall them accurately when asked, and summarize memory context
  clearly.

system_prompt_codemode_addons: null

welcome_notebook: null
welcome_document: null

trigger: null
