# Agent Specification: Demo Evals (No Codemode)
# Runtime agent used by eval examples for local and cloud execution without codemode.

id: example-evals-nocodemode
version: 0.0.1
name: Example Evals Agent (No Codemode)
description: >-
  Evals runner variant with codemode disabled for A/B comparisons against
  example-evals in SDK eval examples.

tags:
  - evals
  - demo
  - runner
  - no-codemode

enabled: true
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

sandbox_variant: jupyter

memory: ephemeral

mcp_servers: []

skills:
  - events:0.0.1

tools:
  - runtime-echo:0.0.1

disable_tool_approvals: true

frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

environment_name: ai-agents-env

icon: pulse
emoji: "🧪"
color: "#0284C7"

suggestions:
  - Run the selected evaluation experiment on the configured dataset
  - Validate experiment configuration and report missing fields
  - Summarize run results with pass rate and latency highlights

welcome_message: >-
  Ready to run eval experiments without codemode enabled. Configure your
  benchmark and evaluator setup, then launch a run.

system_prompt: >-
  You are the Demo Evals Runner. Execute evaluation workflows reliably,
  validate inputs before execution, and summarize outcomes clearly.

system_prompt_codemode_addons: null

codemode:
  enabled: false

welcome_notebook: null
welcome_document: null

trigger: null
