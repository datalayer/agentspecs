# Agent Specification: Sync CRM Contacts
# Multi-agent team that collects, analyzes, deduplicates, and syncs contact
# data across CRM systems with supervisor orchestration.
# Source: UI mock flow id=2 (Agents.tsx, AgentTeam.tsx)

id: sync-crm-contacts
version: 0.0.1
name: Sync CRM Contacts
description: >
  A multi-agent team that collects and aggregates contact data from multiple
  CRM sources, analyzes and deduplicates records, writes cleaned data back,
  and generates sync summary reports.

tags:
  - sales
  - crm
  - data-sync
  - deduplication

enabled: false
model: "bedrock:us.anthropic.claude-3-5-haiku-20241022-v1:0"

sandbox_variant: jupyter

# Memory backend
memory: ephemeral

# MCP servers used by this agent team
mcp_servers:
  - filesystem:0.0.1
  - slack:0.0.1

# Skills available to this agent team
skills:
  - pdf:0.0.1
  - events:0.0.1

# Runtime environment
frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1
environment_name: ai-agents-env

# UI customization
icon: people
emoji: 🔄
color: "#0969da"  # Blue

# Goal / Prompt (Step 4 in the UI — the user-facing objective)
goal: >-
  Collect and aggregate contact data from multiple CRM sources, analyze and
  deduplicate records, write cleaned data back to CRM systems, and generate
  sync summary reports with notifications.

# Protocols & UI Extensions
protocol: vercel-ai
ui_extension: a2ui

# Guardrails
guardrails:
  - name: GitHub CI Bot
    identity_provider: github
    identity_name: ci-bot@acme.com
    permissions:
      read:data: true
      write:data: true
      execute:code: true
      access:internet: true
      send:email: true
      deploy:production: false
    token_limits:
      per_run: "60K"
      per_day: "600K"
      per_month: "6M"

# Evals
evals:
  - name: Data Quality
    category: coding
    task_count: 300
  - name: Deduplication Accuracy
    category: reasoning
    task_count: 150

# Codemode
codemode:
  enabled: true
  token_reduction: "~85%"
  speedup: "~1.5× faster"

# Advanced settings
advanced:
  cost_limit: "$10.00 per run"
  time_limit: "600 seconds"
  max_iterations: 100
  validation: "All CRM records must reconcile after sync"

# Authorization policy
authorization_policy: ""

# Trigger configuration
trigger:
  type: schedule
  cron: "0 2 * * *"
  description: >
    Daily at 02:00 — sync CRM contacts across all sources during off-peak hours.
  prompt: "Run the scheduled workflow and produce the configured deliverable."

# Output configuration
output:
  formats:
    - JSON
    - PDF
  template: CRM Sync Report
  storage: /outputs/crm-sync/

# Notifications
notifications:
  email: jennifer.c@company.com
  slack: "#crm-sync"

# Chat suggestions
suggestions:
  - Run a full CRM contact sync now
  - Show the latest sync report
  - How many duplicates were found in the last run?
  - List contacts that failed to sync

# Welcome message
welcome_message: >
  Hello! I'm the CRM Contact Sync team orchestrator. I coordinate four
  specialised agents — Data Collector, Analyzer, Sync Writer, and Report
  Generator — to keep your CRM contacts clean, deduplicated, and in sync
  across all platforms.

# System prompt
system_prompt: >
  You are the supervisor of a CRM contact synchronization team. You
  coordinate four agents in sequence:
  1. Data Collector — pulls contact data from Salesforce, HubSpot, and other CRM sources
  2. Analyzer — identifies duplicates, patterns, and data quality issues
  3. Sync Writer — writes cleaned, merged contacts back to all CRM systems
  4. Report Generator — produces sync summary reports and sends notifications
  Route tasks sequentially. Escalate to human review if any sync operation
  fails 3 times. Always confirm merge decisions for contacts with conflicting data.

system_prompt_codemode_addons: null

welcome_notebook: null
welcome_document: null
