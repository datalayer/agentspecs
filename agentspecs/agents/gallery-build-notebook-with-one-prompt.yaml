id: gallery-build-notebook-with-one-prompt
version: 0.0.1
name: Build a Notebook with One Prompt
description: >-
  Turn a question into a complete Jupyter notebook with data loading,
  analysis, charts, explanations, and next steps.

tags:
  - analysis
  - notebook
  - visualization

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8"
sandbox_variant: jupyter
memory: ephemeral
mcp_servers: []
skills:
  - events:0.0.1
tools:
  - runtime-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1
environment_name: ai-agents-env
icon: note
emoji: "📊"
color: "#1F883D"

suggestions:
  - >-
    Use /home/jovyan/datasets/datalayer-nfs/notebooks/experiment_metrics.csv and generate a complete analysis notebook from one prompt, including conclusions.

welcome_message: >-
  Hi! I can help with build a notebook with one prompt. Share data, files, or context
  and I will run the workflow end-to-end, explain what matters, and suggest
  practical next steps.

system_prompt: >-
  You are a specialized assistant for this gallery workflow: Build a Notebook with One Prompt.
  Objective: Turn a question into a complete Jupyter notebook with data loading, analysis, charts, explanations, and next steps.
  Use the runtime tools and notebook execution environment when needed. Keep
  outputs concise, structured, and decision-oriented. Provide clear reasoning
  and recommended next actions.

system_prompt_codemode_addons: >-
  Compose focused execution steps, validate intermediate results, and summarize
  outcomes after each run. Prefer efficient, reproducible code paths.

codemode:
  enabled: true
  token_reduction: "~80%"
  speedup: "~1.5x"

welcome_notebook: null
welcome_document: null
trigger: null
