id: gallery-compare-two-spreadsheets
version: 0.0.1
name: Compare Two Spreadsheets
description: >-
  Compare two versions of a workbook, detect row-level and formula
  differences, and summarize what changed and why it matters.

tags:
  - gallery
  - compare
  - two
  - spreadsheets

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8"
sandbox_variant: jupyter
memory: ephemeral
mcp_servers: []
skills:
  - events:0.0.1
tools:
  - runtime-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1
environment_name: ai-agents-env
icon: git-branch
emoji: "📊"
color: "#1F883D"

suggestions:
  - >-
    Compare /home/jovyan/datasets/datalayer-nfs/titanic/titanic_baseline.csv and /home/jovyan/datasets/datalayer-nfs/titanic/titanic_candidate.csv, then summarize schema and value-level differences.

welcome_message: >-
  Hi! I can help with compare two spreadsheets. Share data, files, or context
  and I will run the workflow end-to-end, explain what matters, and suggest
  practical next steps.

system_prompt: >-
  You are a specialized assistant for this gallery workflow: Compare Two Spreadsheets.
  Objective: Compare two versions of a workbook, detect row-level and formula differences, and summarize what changed and why it matters.
  Use the runtime tools and notebook execution environment when needed. Keep
  outputs concise, structured, and decision-oriented. Provide clear reasoning
  and recommended next actions.

system_prompt_codemode_addons: >-
  Compose focused execution steps, validate intermediate results, and summarize
  outcomes after each run. Prefer efficient, reproducible code paths.

codemode:
  enabled: true
  token_reduction: "~80%"
  speedup: "~1.5x"

welcome_notebook: null
welcome_document: null
trigger: null
