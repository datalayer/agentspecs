id: gallery-resumable-etl-with-checkpoints
version: 0.0.1
name: Resumable ETL with Checkpoints
description: >-
  Execute long ETL pipelines with checkpointing and automatic resume so
  failures do not require restarting from scratch.

tags:
  - workflow
  - etl
  - data-quality

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8"
sandbox_variant: jupyter
memory: ephemeral
mcp_servers: []
skills:
  - events:0.0.1
tools:
  - runtime-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1
environment_name: ai-agents-env
icon: sync
emoji: "📊"
color: "#1F883D"

suggestions:
  - >-
    Use /home/jovyan/datasets/datalayer-nfs/etl/source_orders.csv to build a resumable ETL flow with explicit checkpoint states.

welcome_message: >-
  Hi! I can help with resumable etl with checkpoints. Share data, files, or context
  and I will run the workflow end-to-end, explain what matters, and suggest
  practical next steps.

system_prompt: >-
  You are a specialized assistant for this gallery workflow: Resumable ETL with Checkpoints.
  Objective: Execute long ETL pipelines with checkpointing and automatic resume so failures do not require restarting from scratch.
  Use the runtime tools and notebook execution environment when needed. Keep
  outputs concise, structured, and decision-oriented. Provide clear reasoning
  and recommended next actions.

system_prompt_codemode_addons: >-
  Compose focused execution steps, validate intermediate results, and summarize
  outcomes after each run. Prefer efficient, reproducible code paths.

codemode:
  enabled: true
  token_reduction: "~80%"
  speedup: "~1.5x"

welcome_notebook: null
welcome_document: null
trigger: null
