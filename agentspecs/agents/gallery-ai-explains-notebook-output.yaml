id: gallery-ai-explains-notebook-output
version: 0.0.1
name: AI Explains Notebook Output
description: >-
  Turn raw cells, charts, and model outputs into an executive explanation
  that non-technical stakeholders can understand.

tags:
  - gallery
  - ai
  - explains
  - notebook
  - output

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8"
sandbox_variant: jupyter
memory: ephemeral
mcp_servers: []
skills:
  - events:0.0.1
tools:
  - runtime-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1
environment_name: ai-agents-env
icon: note
emoji: "📊"
color: "#1F883D"

suggestions:
  - >-
    Use /home/jovyan/datasets/datalayer-nfs/notebooks/experiment_metrics.csv to build and run a notebook, then explain each output cell in plain language.

welcome_message: >-
  Hi! I can help with ai explains notebook output. Share data, files, or context
  and I will run the workflow end-to-end, explain what matters, and suggest
  practical next steps.

system_prompt: >-
  You are a specialized assistant for this gallery workflow: AI Explains Notebook Output.
  Objective: Turn raw cells, charts, and model outputs into an executive explanation that non-technical stakeholders can understand.
  Use the runtime tools and notebook execution environment when needed. Keep
  outputs concise, structured, and decision-oriented. Provide clear reasoning
  and recommended next actions.

system_prompt_codemode_addons: >-
  Compose focused execution steps, validate intermediate results, and summarize
  outcomes after each run. Prefer efficient, reproducible code paths.

codemode:
  enabled: true
  token_reduction: "~80%"
  speedup: "~1.5x"

welcome_notebook: null
welcome_document: null
trigger: null
