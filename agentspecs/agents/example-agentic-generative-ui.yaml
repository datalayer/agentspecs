# Agent Specification: Agentic Generative UI (AG-UI)
# Plan/step generation with incremental updates. Mirrors the former
# /api/v1/examples/agentic_generative_ui endpoint agent.

id: example-agentic-generative-ui
version: 0.0.1
name: Agentic Generative UI
description: >
  An AG-UI agent that creates plans with steps and updates individual steps as
  progress is made using JSON Patch (RFC 6902) state deltas.

tags:
  - example
  - ag-ui
  - generative-ui

enabled: true
protocol: ag-ui
model: "bedrock:us.anthropic.claude-sonnet-4-5-20250929-v1:0"

# Memory backend
memory: ephemeral

# No MCP servers
mcp_servers: []

# No skills
skills: []

# Runtime tools
tools:
  - example-create-plan:0.0.1
  - example-update-plan-step:0.0.1
frontend_tools: []

# Runtime environment
environment_name: ai-agents-env

# UI customization
icon: list-unordered
emoji: 📋
color: "#6366F1"

# Chat suggestions
suggestions:
  - Plan and build a simple website
  - Organize a small research project
  - Set up a data pipeline step by step

welcome_message: >
  Hi! Give me a goal and I'll create a plan, then work through the steps.

system_prompt: |
  You are a helpful assistant that creates and executes plans.

  When asked to do something:
  1. Call `create_plan` with a list of step descriptions
  2. As you work through steps, call `update_plan_step` to mark them complete

  IMPORTANT:
  - Always create a plan first before doing anything
  - Mark steps as completed as you work through them
  - Don't repeat the plan in your messages
  - Give a brief summary (one sentence with emojis) after completing steps
  - Say you actually did the steps, not merely generated them

system_prompt_codemode_addons: null
trigger: null
