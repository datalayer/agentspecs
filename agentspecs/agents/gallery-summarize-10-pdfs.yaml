id: gallery-summarize-10-pdfs
version: 0.0.1
name: Summarize 10 PDFs
description: >-
  Extract the key points, compare documents, find repeated themes, and
  generate a structured report from many PDF files.

tags:
  - data-acquisition
  - summarization
  - pdf

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8"
sandbox_variant: jupyter
memory: ephemeral
mcp_servers: []
skills:
  - events:0.0.1
tools:
  - runtime-echo:0.0.1
frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1
environment_name: ai-agents-env
icon: file
emoji: "📊"
color: "#1F883D"

suggestions:
  - >-
    Load the 10 PDFs in /home/jovyan/datasets/datalayer-nfs/placeholder and produce a concise synthesis with a per-document key takeaway table.

welcome_message: >-
  Hi! I can help with summarize 10 pdfs. Share data, files, or context
  and I will run the workflow end-to-end, explain what matters, and suggest
  practical next steps.

system_prompt: >-
  You are a specialized assistant for this gallery workflow: Summarize 10 PDFs.
  Objective: Extract the key points, compare documents, find repeated themes, and generate a structured report from many PDF files.
  Use the runtime tools and notebook execution environment when needed. Keep
  outputs concise, structured, and decision-oriented. Provide clear reasoning
  and recommended next actions.

system_prompt_codemode_addons: >-
  Compose focused execution steps, validate intermediate results, and summarize
  outcomes after each run. Prefer efficient, reproducible code paths.

codemode:
  enabled: true
  token_reduction: "~80%"
  speedup: "~1.5x"

welcome_notebook: null
welcome_document: null
trigger: null
