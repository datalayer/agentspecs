# Agent Specification: Skills Demo
# Runtime agent used by AgentSkillsExample to demonstrate
# file-based and package-based skills.

id: example-skills
version: 0.0.1
name: Example Skills Agent
description: >-
  Demo agent for skills usage with mixed discovery sources, including
  built-in file skills and package-registered skills like datalayer-whoami.

tags:
  - workflow
  - automation
  - analysis

enabled: true
model: "bedrock:us.anthropic.claude-opus-4-8"

sandbox_variant: jupyter

memory: ephemeral

mcp_servers: []

skills:
  - crawl:0.0.1
  - events:0.0.1
  - github:0.0.1
  - pdf:0.0.1
  - text-summarizer:0.0.1
  - jokes:0.0.1
  - datalayer-whoami:1.0.0

tools: []

frontend_tools:
  - jupyter-notebook:0.0.1
  - lexical-document:0.0.1

environment_name: ai-agents-env

icon: briefcase
emoji: "🧰"
color: "#0D9488"

suggestions:
  - List all your available skills and group them by source type
  - Use datalayer-whoami to return my user identity context
  - Use crawl to summarize https://datalayer.ai
  - Use github to list public repositories for an account

welcome_message: >-
  Hi! I am the Skills Demo Agent. I can use built-in file skills and
  package-registered skills such as datalayer-whoami.

system_prompt: >-
  You are a skills-focused assistant. Use skills when they are relevant to
  user intent, and summarize tool outputs clearly in natural language.

system_prompt_codemode_addons: null

welcome_notebook: null
welcome_document: null

trigger: null
