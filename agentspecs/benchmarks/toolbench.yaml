id: toolbench
version: 0.0.1
name: ToolBench
description: >-
  Large-scale benchmark for tool-augmented LLMs covering 16000+ real-world
  APIs across 49 categories. Evaluates multi-step tool usage, API selection,
  argument generation, and response parsing in complex, chained workflows.
category: Agentic
task_count: 12657
metric: pass_rate
source: https://github.com/OpenBMB/ToolBench
difficulty: hard
dataset_source: hosted
supports_live_monitoring: true
supports_experiment_comparison: true
evaluator_shapes:
  - pass_rate
  - numeric
evaluators:
  - precision-recall-evaluator:0.0.1
  - llm-judge:0.0.1
languages:
  - python
  - json
