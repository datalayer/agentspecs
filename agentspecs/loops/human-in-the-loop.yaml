# Loop Specification: Human-in-the-Loop
# A generic observe → think → act → evaluate loop that pauses for explicit
# human approval before performing sensitive or irreversible actions such as
# spending money, deleting data, sending email, or deploying to production.

id: human-in-the-loop
version: 0.0.1
name: Human-in-the-Loop
description: >
  A control loop that runs autonomously but stops for explicit human approval
  before any sensitive or irreversible action. The human sits outside the loop,
  defining the goal and constraints, and steps in only when the agent needs a
  decision it is not permitted to make on its own.

objective: >
  Complete the task autonomously while requesting human approval before any
  sensitive or irreversible action.

strategy: observe-think-act-evaluate

phases:
  - observe
  - think
  - act
  - evaluate

constraints:
  - Never perform an approval-gated action without explicit human sign-off
  - Surface a clear summary of the pending action when requesting approval

termination:
  max_iterations: 12
  success_criteria:
    - The task is complete and all approvals were obtained
  failure_criteria:
    - The human rejects a required action and no alternative exists
  on_blocked: ask-human

human:
  mode: approve
  approval_required: true
  approval_for:
    - delete-data
    - send-email
    - spend-money
    - deploy-production
  description: >
    The loop pauses and waits for human approval before executing any action
    listed in approval_for, then resumes with the human's decision.

state_backends:
  - notebook
  - runtime
  - filesystem

tags:
  - human-in-the-loop
  - approval
  - safety
  - generic

icon: person
emoji: 🙋
