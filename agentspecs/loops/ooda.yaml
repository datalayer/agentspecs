# Loop Specification: OODA Loop
# The classic Observe → Orient → Decide → Act control loop, adapted for
# LLM-driven agents. Generic enough to drive any decision-oriented task where
# the agent must repeatedly re-assess a changing environment.

id: ooda
version: 0.0.1
name: OODA Loop
description: >
  A generic Observe → Orient → Decide → Act control loop. The agent observes
  the current state, orients by interpreting it in the context of the goal,
  decides on the next action, and acts. The loop is well suited to
  decision-oriented and monitoring tasks over a changing environment.

objective: >
  Continuously assess the environment and take the best next action toward the
  goal until it is reached or a stop condition is met.

strategy: ooda

phases:
  - observe
  - orient
  - decide
  - act

constraints:
  - Re-observe fresh state at the start of every iteration
  - Keep each decision small and reversible when possible

termination:
  max_iterations: 20
  success_criteria:
    - The goal condition is satisfied
  failure_criteria:
    - A hard stop condition or budget limit is reached
  on_blocked: retry

human:
  mode: none
  approval_required: false
  approval_for: []
  description: >
    Fully autonomous loop with no human interaction during execution.

state_backends:
  - runtime
  - filesystem
  - sql

tags:
  - ooda
  - decision-loop
  - generic
  - monitoring

icon: sync
emoji: 🔄
