id: tavily
version: 0.0.1
name: Tavily Search
description: Web search and research capabilities via Tavily API

command: npx
args:
  - "-y"
  - "tavily-mcp"

transport: stdio

env:
  TAVILY_API_KEY: ${TAVILY_API_KEY}

envvars:
  - TAVILY_API_KEY:0.0.1

tags:
  - search
  - research
  - web

icon: search
emoji: 🔍
