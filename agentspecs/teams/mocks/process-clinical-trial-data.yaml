# Team Specification: Process Clinical Trial Data
# Auto-extracted from agent spec process-clinical-trial-data

id: process-clinical-trial-data
name: Process Clinical Trial Data
description: 'A multi-agent team that automates clinical trial data processing across dozens of trial
  sites. Harmonises patient records and lab results to CDISC SDTM format, detects safety signals and adverse
  events in real time, and prepares submission-ready datasets — all with strict HIPAA and GxP compliance
  guardrails.

  '
tags:
- healthcare
- pharma
- clinical-trials
- patient-data
- compliance
enabled: false
icon: heart
emoji: 🏥
color: '#cf222e'
agent_spec_id: process-clinical-trial-data
orchestration_protocol: datalayer
execution_mode: sequential
supervisor:
  name: Clinical Data Orchestrator Agent
  model: anthropic-claude-sonnet-4
routing_instructions: 'Route incoming data through the Ingestion Agent first for format detection and
  parsing, then to Harmonisation Agent for CDISC SDTM standardisation, then Safety Monitor for adverse
  event screening, then Submission Preparer for final dataset assembly. Escalate serious adverse events
  (SAEs) immediately to the medical officer.

  '
validation:
  timeout: 600s
  retry_on_failure: true
  max_retries: 2
agents:
- id: ct-1
  name: Data Ingestion Agent
  role: Primary · Initiator
  goal: Ingest patient records, lab results, and CRFs from clinical sites
  model: openai-gpt-4-1
  mcp_server: Clinical EDC MCP
  tools:
  - Medidata Connector
  - Veeva Vault Reader
  - Oracle Clinical Adapter
  - Format Detector
  trigger: 'Event: new data batch received from site'
  approval: auto
- id: ct-2
  name: Harmonisation Agent
  role: Secondary
  goal: Standardise all data to CDISC SDTM format with MedDRA coding
  model: openai-gpt-4-1
  mcp_server: Data Standards MCP
  tools:
  - SDTM Mapper
  - MedDRA Coder
  - Unit Converter
  - Site Normaliser
  trigger: On completion of Data Ingestion Agent
  approval: auto
- id: ct-3
  name: Safety Monitor Agent
  role: Secondary
  goal: Screen every data point for adverse events and safety signals
  model: anthropic-claude-sonnet-4
  mcp_server: Safety Database MCP
  tools:
  - AE Classifier
  - Signal Detector
  - SAE Escalator
  - Evidence Trail Builder
  trigger: On completion of Harmonisation Agent
  approval: manual
- id: ct-4
  name: Submission Preparer Agent
  role: Final
  goal: Assemble submission-ready SDTM datasets with validation and define.xml
  model: openai-gpt-4-1
  mcp_server: Submission MCP
  tools:
  - Dataset Validator
  - Define.xml Generator
  - PDF Report Builder
  - Compliance Checker
  trigger: On completion of Safety Monitor Agent
  approval: auto
reaction_rules:
- id: rr-clin-1
  trigger: safety_signal_detected
  action: halt_and_escalate
  auto: true
  max_retries: 0
  escalate_after_retries: 0
  priority: critical
- id: rr-clin-2
  trigger: data_integrity_violation
  action: quarantine_and_notify
  auto: true
  max_retries: 1
  escalate_after_retries: 1
  priority: critical
health_monitoring:
  heartbeat_interval: 10s
  stale_threshold: 45s
  unresponsive_threshold: 90s
  stuck_threshold: 180s
  max_restart_attempts: 2
notifications:
  on_start: true
  on_completion: true
  on_failure: true
  on_escalation: true
output:
  formats:
  - pdf
  - json
  - xml
  template: Clinical Trial Data Report
  storage: s3://reports/clinical-trials/
