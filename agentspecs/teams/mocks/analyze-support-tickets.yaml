# Team Specification: Analyze Support Tickets
# Auto-extracted from agent spec analyze-support-tickets

id: analyze-support-tickets
name: Analyze Support Tickets
description: 'A multi-agent team that triages incoming support tickets, categorizes by urgency and topic,
  identifies recurring patterns, and generates resolution recommendations with escalation paths.

  '
tags:
- analytics
- data
- support
- tickets
enabled: true
icon: issue-opened
emoji: 🎫
color: '#bf8700'
agent_spec_id: analyze-support-tickets
orchestration_protocol: datalayer
execution_mode: sequential
supervisor:
  name: Support Orchestrator Agent
  model: openai-gpt-4-1
routing_instructions: 'Route new tickets to the Triage Agent first, then to the Categorizer, then to the
  Pattern Analyzer. Escalate P1/critical tickets immediately to human support leads.

  '
validation:
  timeout: 180s
  retry_on_failure: true
  max_retries: 2
agents:
- id: st-1
  name: Triage Agent
  role: Primary · Initiator
  goal: Ingest new support tickets and assess urgency level (P1-P4)
  model: openai-gpt-4-1
  mcp_server: Helpdesk MCP
  tools:
  - Ticket Reader
  - Priority Classifier
  trigger: 'Event: new ticket received'
  approval: auto
- id: st-2
  name: Categorizer Agent
  role: Secondary
  goal: Categorize tickets by topic, product area, and sentiment
  model: openai-gpt-4-1
  mcp_server: NLP Pipeline MCP
  tools:
  - Topic Classifier
  - Sentiment Analyzer
  - Product Tagger
  trigger: On completion of Triage Agent
  approval: auto
- id: st-3
  name: Pattern Analyzer Agent
  role: Final
  goal: Identify recurring issues and generate resolution recommendations
  model: anthropic-claude-sonnet-4
  mcp_server: Analytics MCP
  tools:
  - Pattern Detector
  - Knowledge Base Search
  - Resolution Generator
  trigger: On completion of Categorizer Agent
  approval: manual
reaction_rules:
- id: rr-supp-1
  trigger: ticket_surge_detected
  action: escalate_to_supervisor
  auto: true
  max_retries: 2
  escalate_after_retries: 2
  priority: high
- id: rr-supp-2
  trigger: classification_confidence_low
  action: request_human_review
  auto: false
  max_retries: 1
  escalate_after_retries: 1
  priority: medium
health_monitoring:
  heartbeat_interval: 15s
  stale_threshold: 60s
  unresponsive_threshold: 180s
  stuck_threshold: 300s
  max_restart_attempts: 3
notifications:
  on_start: false
  on_completion: true
  on_failure: true
  on_escalation: true
output:
  formats:
  - pdf
  - json
  template: Support Ticket Analysis
  storage: s3://reports/support-analytics/
