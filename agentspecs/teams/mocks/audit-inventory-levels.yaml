# Team Specification: Audit Inventory Levels
# Auto-extracted from agent spec audit-inventory-levels

id: audit-inventory-levels
name: Audit Inventory Levels
description: 'A multi-agent team that monitors inventory levels across warehouses, detects discrepancies
  between physical and system counts, forecasts demand by SKU, and generates automated reorder recommendations.

  '
tags:
- finance
- automation
- inventory
- supply-chain
enabled: true
icon: package
emoji: 📦
color: '#0969da'
agent_spec_id: audit-inventory-levels
orchestration_protocol: datalayer
execution_mode: sequential
supervisor:
  name: Inventory Orchestrator Agent
  model: openai-gpt-4-1
routing_instructions: 'Start with the Scanner to pull current levels, then Auditor to check discrepancies,
  then Forecaster for demand predictions, then Planner for reorder recommendations, then Reporter for
  the final audit report. Escalate critical shortages immediately.

  '
validation:
  timeout: 600s
  retry_on_failure: true
  max_retries: 3
agents:
- id: inv-1
  name: Inventory Scanner Agent
  role: Primary · Initiator
  goal: Pull current inventory levels from all warehouse management systems
  model: openai-gpt-4-1
  mcp_server: Warehouse MCP
  tools:
  - WMS Connector
  - Barcode Scanner API
  trigger: 'Schedule: Every 6 hours'
  approval: auto
- id: inv-2
  name: Discrepancy Auditor Agent
  role: Secondary
  goal: Compare system counts vs physical counts and flag discrepancies
  model: openai-gpt-4-1
  mcp_server: Audit MCP
  tools:
  - Count Comparator
  - Discrepancy Logger
  - Shrinkage Calculator
  trigger: On completion of Inventory Scanner
  approval: auto
- id: inv-3
  name: Demand Forecaster Agent
  role: Secondary
  goal: Forecast demand by SKU using historical sales and seasonal patterns
  model: anthropic-claude-sonnet-4
  mcp_server: Analytics MCP
  tools:
  - Time Series Model
  - Seasonal Analyzer
  - External Signals Fetcher
  trigger: On completion of Discrepancy Auditor
  approval: auto
- id: inv-4
  name: Reorder Planner Agent
  role: Secondary
  goal: Calculate optimal reorder points and generate purchase order recommendations
  model: openai-gpt-4-1
  mcp_server: Procurement MCP
  tools:
  - EOQ Calculator
  - Supplier Catalog
  - PO Generator
  trigger: On completion of Demand Forecaster
  approval: manual
- id: inv-5
  name: Audit Report Agent
  role: Final
  goal: Compile inventory audit report with discrepancies, forecasts, and reorder plan
  model: openai-gpt-4-1
  mcp_server: Document Generation MCP
  tools:
  - PDF Generator
  - Chart Builder
  - Email Sender
  trigger: On completion of Reorder Planner
  approval: auto
reaction_rules:
- id: rr-inv-1
  trigger: stockout_risk_detected
  action: escalate_to_supervisor
  auto: true
  max_retries: 1
  escalate_after_retries: 1
  priority: high
- id: rr-inv-2
  trigger: discrepancy_threshold_exceeded
  action: flag_for_manual_audit
  auto: false
  max_retries: 2
  escalate_after_retries: 2
  priority: high
health_monitoring:
  heartbeat_interval: 30s
  stale_threshold: 120s
  unresponsive_threshold: 300s
  stuck_threshold: 600s
  max_restart_attempts: 3
notifications:
  on_start: true
  on_completion: true
  on_failure: true
  on_escalation: true
output:
  formats:
  - pdf
  - xlsx
  - csv
  template: Inventory Audit Report
  storage: s3://reports/inventory-audits/
